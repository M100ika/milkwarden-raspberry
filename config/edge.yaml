device_id: "milkwarden-edge-01"

serial:
  port: "/dev/ttyUSB0"
  baud: 115200
  timeout_sec: 2

nextion:
  enabled: true
  port: "/dev/serial0"
  baud: 9600
  timeout_sec: 1.0
  components:
    ip:    "t0"
    rfid:  "t1"
    weight: "t2"
    stall: "t3"
    state: "p0"
    page_main: 0

server:
  enabled: false
  url: "https://example.com/api/sessions"
  timeout_sec: 10
  batch_size: 50

sync:
  checks_per_day: 5
